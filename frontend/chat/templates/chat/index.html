{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Ágil - IA Assistant</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        },
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, transparent 40%),
                              radial-gradient(circle at bottom left, #134e4a, transparent 40%);
            background-attachment: fixed;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .msg-enter {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        function toggleDebug() {
            if (debugPanel.classList.contains('translate-x-full')) {
                debugPanel.classList.remove('translate-x-full');
            } else {
                debugPanel.classList.add('translate-x-full');
            }

        const addDebugLog = (source, message, isHighlight=false) => {
            const time = new Date().toLocaleTimeString('pt-BR', { hour12: false });
            const colorClass = isHighlight ? 'text-amber-400 bg-amber-400/10 p-2 rounded border border-amber-400/20' : 'text-slate-400';
            const logHtml = `
                <div class="border-l-2 border-slate-700 pl-3 py-1 ${colorClass}">
                    <span class="text-slate-600 mr-2 text-[10px]">${time}</span>
                    <strong class="text-slate-300">[${source}]</strong> ${message}
                </div>`;
            debugLogs.insertAdjacentHTML('beforeend', logHtml);
            debugLogs.scrollTop = debugLogs.scrollHeight;
        };

        const generateUUID = () => {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        };

        const removeTyping = () => {
            const indicator = document.getElementById('typing-indicator-box');
            if (indicator) indicator.remove();
        };

        const sendMessage = async (message) => {
            if (!currentThreadId) currentThreadId = generateUUID();
            
            addDebugLog('NET', `POST -> /api/chat | payload=${message.substring(0,20)}...`);
            
            try {
                const payload = {
                    message: message,
                    thread_id: currentThreadId
                };
                if (authCpf) payload.cpf = authCpf;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error('API Error ' + response.status);
                
                const data = await response.json();
                addDebugLog('NET', `200 OK | received response`);

                // Detect Agent Transition (Silently)
                if (data.current_agent !== lastReportedAgent) {
                    addDebugLog('LANGGRAPH', `⚠️ TRANSIÇÃO DE AGENTE: ${lastReportedAgent.toUpperCase()} => ${data.current_agent.toUpperCase()}`, true);
                    lastReportedAgent = data.current_agent;
                } else {
                    addDebugLog('REDUCER', `Worker ativo: ${data.current_agent.toUpperCase()}`);
                }
                
                // Detection of Thread Hopping 
                if (data.thread_id !== currentThreadId) {
                    addDebugLog('SQLITE', `🔄 THREAD HOPPING EXECUTADO! ID alterado de Temp UUID para CPF base: ${data.thread_id}`, true);
                    currentThreadId = data.thread_id;
                    authCpf = data.cpf;
                }
                
                return data.response;
                
            } catch (err) {
                console.error(err);
                addDebugLog('ERROR', `Falha ao alcançar backend em ${API_URL}`);
                return "Desculpe, ocorreu um erro de conexão com os servidores do banco FastAPI.";
            }
        };

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            addUserMessage(text);
            showTyping();
            
            messageInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.classList.add('opacity-50');
            
            const botResponse = await sendMessage(text);
            
            removeTyping();
            addBotMessage(botResponse);
            
            messageInput.disabled = false;
            sendBtn.disabled = false;
            sendBtn.classList.remove('opacity-50');
            messageInput.focus();
        });

        const resetChat = () => {
            location.reload();
        };

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 120 ? this.scrollHeight : 120) + 'px';
        });
    </script>
